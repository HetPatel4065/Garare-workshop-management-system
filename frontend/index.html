<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" href="/logo.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Garage Management System</title>
</head>

<body>
  <div id="root">
    <!-- Immediate Pre-loader for slow networks -->
    <style>
      .preloader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .preloader-circle {
        width: 64px;
        height: 64px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }

      .preloader-text {
        color: #111111;
        font-weight: 800;
        font-size: 24px;
        letter-spacing: -0.025em;
      }

      .preloader-text span {
        color: #3b82f6;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="preloader">
      <div class="preloader-circle"></div>
      <div class="preloader-text">Garage<span>Pro</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
