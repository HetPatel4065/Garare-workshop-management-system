<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
  (function() {
    try {
      // 1. Check sessionStorage to match your React context
      var storedTheme = sessionStorage.getItem('theme');
      
      // 2. Default to 'light' if it's a completely new tab session
      var theme = storedTheme ? storedTheme : 'light';
      
      var isDark = false;
      if (theme === 'dark') {
        isDark = true;
      } else if (theme === 'system') {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch (e) {}
  })();
</script>

  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Management System</title>
</head>

<body>
  <div id="root">
    <!-- Immediate Pre-loader for slow networks -->
    <style>
      /* Define variables so they resolve instantly based on the class */
      :root {
        --bg-color: #ffffff;
        --text-color: #111111;
      }
      
      html.dark {
        --bg-color: #090d16;
        --text-color: #f3f4f6;
      }

      .preloader {
        position: fixed;
        inset: 0;
        background: var(--bg-color); /* Uses variable */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .preloader-circle {
        width: 64px;
        height: 64px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }

      .preloader-text {
        color: var(--text-color); /* Uses variable */
        font-weight: 800;
        font-size: 24px;
        letter-spacing: -0.025em;
      }

      .preloader-text span {
        color: #3b82f6;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="preloader">
      <div class="preloader-circle"></div>
      <div class="preloader-text">Garage<span>Pro</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
